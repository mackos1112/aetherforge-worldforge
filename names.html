<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Procedural Name Generator | Aetherforge Worldforge</title>
    <!-- Google Fonts: Merriweather (serif) and Share Tech / Share (sans-serif) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,300;0,400;0,700;1,300&family=Share+Tech&family=Share:ital,wght@0,400;0,700;1,400&family=Outfit:wght@300;400;600;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .names-layout {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 24px;
            height: calc(100vh - 70px);
            padding: 24px;
            overflow: hidden;
        }

        .names-sidebar {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 24px;
            backdrop-filter: var(--glass-blur);
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
        }

        .names-workspace {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 24px;
            backdrop-filter: var(--glass-blur);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .workspace-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 16px;
            margin-bottom: 20px;
        }

        .workspace-title {
            font-family: var(--font-heading);
            font-size: 20px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .names-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
            overflow-y: auto;
            flex-grow: 1;
            padding-right: 8px;
        }

        .name-card {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s ease;
        }

        .name-card:hover {
            border-color: var(--accent-primary);
            box-shadow: 0 0 10px var(--accent-glow);
            transform: translateY(-2px);
        }

        .name-text {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            font-family: var(--font-body);
        }

        .copy-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 14px;
            padding: 4px;
            transition: color 0.2s ease;
        }

        .copy-btn:hover {
            color: var(--accent-primary);
        }

        .action-button {
            background: var(--accent-primary);
            color: #000;
            border: none;
            border-radius: var(--radius-md);
            padding: 12px 20px;
            font-family: var(--font-heading);
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s ease;
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .action-button:hover {
            background: var(--accent-hover);
            box-shadow: 0 0 25px var(--accent-glow-strong);
            transform: translateY(-1px);
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-family: var(--font-heading);
            font-weight: 600;
            color: var(--text-secondary);
        }

        .form-control {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            padding: 8px 12px;
            font-family: var(--font-body);
            width: 100%;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--accent-primary);
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: var(--text-muted);
            flex-grow: 1;
            gap: 12px;
        }

        .empty-state-icon {
            font-size: 48px;
        }
    </style>
</head>
<body class="dungeon-fullscreen-body">
    <div class="app-container">
        <!-- HEADER -->
        <header class="watabou-header dungeon-header">
            <div class="header-logo">
                <a href="index.html" class="logo-back-link">
                    <span class="logo-author">Aetherforge's</span>
                    <span class="logo-title">Worldforge</span>
                </a>
            </div>
            
            <div style="flex-grow: 1; text-align: center;">
                <h1 style="font-family: var(--font-heading); font-size: 18px; letter-spacing: 1px; color: var(--text-primary);">
                    ✍️ PROCEDURAL NAME GENERATOR
                </h1>
            </div>

            <div class="header-nav">
                <a href="index.html" class="nav-link">Home</a>
            </div>
        </header>

        <!-- LAYOUT -->
        <div class="names-layout">
            <!-- SIDEBAR -->
            <aside class="names-sidebar">
                <h3 style="font-family: var(--font-heading); font-weight: 700; border-bottom: 1px solid var(--border-color); padding-bottom: 8px;">CONFIGURATION</h3>

                <!-- Style Preset -->
                <div class="form-group">
                    <label for="selStyle">Linguistic Style</label>
                    <select id="selStyle" class="form-control">
                        <option value="elven">🧝 Elven (Melodic, Markov)</option>
                        <option value="dwarven">🧔 Dwarven (Guttural, Markov)</option>
                        <option value="norse">🪓 Norse / Viking (Harsh, Markov)</option>
                        <option value="roman">🏛️ Roman / Latin (Classic, Markov)</option>
                        <option value="eldritch">🐙 Eldritch (Gothic Horror, Markov)</option>
                        <option value="gothic">🏰 Gothic / Medieval (Historic, Markov)</option>
                        <option value="sylElven">💫 Elven Syllables (Syllable Chain)</option>
                        <option value="sylDwarven">⛰️ Dwarven Syllables (Syllable Chain)</option>
                    </select>
                </div>

                <!-- Category -->
                <div class="form-group">
                    <label for="selCategory">Feature Category</label>
                    <select id="selCategory" class="form-control">
                        <option value="city">🏙️ Cities & Settlements</option>
                        <option value="nation">🛡️ Empires & Nations</option>
                        <option value="mountain">🏔️ Mountain Ranges & Peaks</option>
                        <option value="forest">🌲 Forests & Wildwoods</option>
                        <option value="water">🌊 Seas, Lakes & Oceans</option>
                        <option value="faction">⚔️ Factions & Guilds</option>
                    </select>
                </div>

                <!-- Variable Syllable Count Info -->
                <div class="form-group">
                    <label>Syllables Count</label>
                    <p style="font-size: 12px; color: var(--text-muted); line-height: 1.4;">
                        Names are generated with a natural, randomized length distribution (2-4 syllables) depending on the category.
                    </p>
                </div>

                <!-- Number of Names to Generate -->
                <div class="form-group">
                    <label for="numCount">Amount to Forge</label>
                    <input type="number" id="numCount" class="form-control" min="5" max="100" value="20">
                </div>

                <div style="margin-top: auto;">
                    <button class="action-button" id="btnGenerate">FORGE NAMES</button>
                </div>
            </aside>

            <!-- WORKSPACE -->
            <main class="names-workspace">
                <div class="workspace-header">
                    <h2 class="workspace-title" id="lblWorkspaceTitle">Forged Names</h2>
                    <button class="action-button" id="btnCopyAll" style="width: auto; padding: 6px 16px; font-size: 13px;">📋 Copy All</button>
                </div>

                <!-- Name List Output Grid -->
                <div class="names-grid" id="namesContainer">
                    <div class="empty-state">
                        <span class="empty-state-icon">✨</span>
                        <p>Configure options and click "Forge Names" to generate procedural fantasy names.</p>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Scripts -->
    <script type="module">
        import { RNG } from './js/world/utils.js';
        import { WorldNameGenerator } from './js/names/names.js';

        let nameGen = new WorldNameGenerator(new RNG(String(Math.random())));

        const selStyle = document.getElementById('selStyle');
        const selCategory = document.getElementById('selCategory');
        const numCount = document.getElementById('numCount');
        const btnGenerate = document.getElementById('btnGenerate');
        const btnCopyAll = document.getElementById('btnCopyAll');
        const namesContainer = document.getElementById('namesContainer');
        const lblWorkspaceTitle = document.getElementById('lblWorkspaceTitle');

        let currentNames = [];

        function renderNames() {
            namesContainer.innerHTML = '';
            if (currentNames.length === 0) {
                namesContainer.innerHTML = `
                    <div class="empty-state">
                        <span class="empty-state-icon">✨</span>
                        <p>Configure options and click "Forge Names" to generate procedural fantasy names.</p>
                    </div>
                `;
                return;
            }

            currentNames.forEach((name, index) => {
                const card = document.createElement('div');
                card.className = 'name-card';
                card.innerHTML = `
                    <span class="name-text">${name}</span>
                    <button class="copy-btn" title="Copy to clipboard">📋</button>
                `;
                
                card.querySelector('.copy-btn').addEventListener('click', () => {
                    navigator.clipboard.writeText(name);
                    const toast = document.createElement('div');
                    toast.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--accent-primary);color:#000;padding:8px 16px;border-radius:4px;font-family:sans-serif;font-weight:bold;z-index:9999;';
                    toast.textContent = `Copied "${name}"`;
                    document.body.appendChild(toast);
                    setTimeout(() => toast.remove(), 1500);
                });

                namesContainer.appendChild(card);
            });
        }

        btnGenerate.addEventListener('click', () => {
            // Re-seed the generator to guarantee new sets
            nameGen = new WorldNameGenerator(new RNG(String(Math.random())));

            const style = selStyle.value;
            const category = selCategory.value;
            const count = parseInt(numCount.value, 10) || 20;

            currentNames = [];
            for (let i = 0; i < count; i++) {
                currentNames.push(nameGen.generate(style, category));
            }

            lblWorkspaceTitle.textContent = `${selStyle.options[selStyle.selectedIndex].text.split(' ')[1]} - ${selCategory.options[selCategory.selectedIndex].text}`;
            renderNames();
        });

        btnCopyAll.addEventListener('click', () => {
            if (currentNames.length === 0) return;
            navigator.clipboard.writeText(currentNames.join('\n'));
            alert('Copied all names to clipboard!');
        });
    </script>
</body>
</html>
